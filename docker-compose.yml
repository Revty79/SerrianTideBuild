services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serrian_tide_app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    ports:
      - "3003:3003"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run db:bootstrap && npm run start"

  db:
    image: postgres:16-alpine
    container_name: serrian_tide_db
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - serrian_tide_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  serrian_tide_db_data:
